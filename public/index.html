<!DOCTYPE html>
<html lang="ko">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Battle Soccer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
